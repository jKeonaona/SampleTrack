{% extends "base.html" %}

{% block title %}New Project{% endblock %}

{% block content %}
  <h1>New Project</h1>

  <form class="stacked" method="post" action="{{ url_for('projects.create') }}">
    <div class="field">
      <label for="project_number">Project Number</label>
      <input type="text" id="project_number" name="project_number" required value="{{ form.project_number or '' }}">
    </div>
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required value="{{ form.name or '' }}">
    </div>
    <div class="field">
      <label for="client">Client</label>
      <input type="text" id="client" name="client" value="{{ form.client or '' }}">
    </div>
    <div class="field">
      <label for="location">Location</label>
      <input type="text" id="location" name="location" value="{{ form.location or '' }}">
    </div>
    <div class="field">
      <label for="status">Status</label>
      <select id="status" name="status">
        {% set current_status = form.status or 'active' %}
        <option value="active" {% if current_status == 'active' %}selected{% endif %}>Active</option>
        <option value="archived" {% if current_status == 'archived' %}selected{% endif %}>Archived</option>
      </select>
    </div>
    <div class="field">
      <label for="jurisdiction">OSHA Jurisdiction</label>
      <select id="jurisdiction" name="jurisdiction">
        {% set current_jurisdiction = form.jurisdiction or 'California' %}
        <option value="California" {% if current_jurisdiction == 'California' %}selected{% endif %}>California</option>
        <option value="Federal" {% if current_jurisdiction == 'Federal' %}selected{% endif %}>Federal</option>
      </select>
      <div style="color: var(--muted); font-size: 0.8rem; margin-top: 0.25rem;">
        California uses Cal/OSHA Table AC-1 and §1532.1 lead limits. Federal uses 29 CFR 1910.1000 Table Z and 1926.62 for projects on federal property or outside California.
      </div>
    </div>
    <div class="actions">
      <button type="submit" class="btn">Create Project</button>
      <a class="btn secondary" href="{{ url_for('projects.list_projects') }}">Cancel</a>
    </div>
  </form>
{% endblock %}
