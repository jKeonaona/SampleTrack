{% extends "base.html" %}

{% block title %}SampleTrack{% endblock %}

{% block content %}
  <h1>SampleTrack</h1>
  <p class="subtitle">Sample analytical results tracking</p>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Projects</div>
      <div class="value">{{ project_count }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Samples</div>
      <div class="value">{{ sample_count }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Results</div>
      <div class="value">{{ result_count }}</div>
    </div>
  </div>
{% endblock %}
